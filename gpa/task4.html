<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .tooltip { position: relative; display: inline-block; cursor: pointer; color: blue; font-weight: bold; }
        .tooltip .tooltiptext { visibility: hidden; width: 300px; background-color: #333; color: #fff; padding: 10px; border-radius: 6px; position: absolute; z-index: 1; bottom: 125%; left: 50%; margin-left: -150px; }
        .tooltip:hover .tooltiptext { visibility: visible; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Program: Computer Science (Example) <span class="tooltip">ℹ️<span class="tooltiptext">GPA is calculated as the sum of (GP * Credits) divided by the sum of Credits. GP is determined by scores: 0-50 (0), 51-60 (1.0), 61-95 (increases by 0.08 per point), 96-100 (4.0).[span_1](start_span)[span_1](end_span)</span></span></h1>

    <table id="courseTable">
        <thead>
            <tr><th>Course</th><th>Credit</th><th>Grade</th><th>Passed</th></tr>
        </thead>
        <tbody id="courseBody">
            <!-- Courses populated by JS -->
        </tbody>
    </table>

    <div class="controls">
        <button onclick="calculateGPA()">Calculate</button>
        <button onclick="calculateAI()">Calculate with Introduction to AI</button>
    </div>

    <h2 id="result"></h2>

    <script>
        const courses = [
            { name: "Introduction to Programming", credit: 6, grade: 85, passed: "Yes" },
            { name: "Academic Techniques", credit: 6, grade: 75, passed: "Yes" },
            { name: "Basics of Physics I", credit: 8, grade: 65, passed: "Yes" },
            { name: "Introduction to AI", credit: 6, grade: 0, passed: "No" },
            { name: "Systems, Sustainability, and Climate change", credit: 6, grade: 51, passed: "Yes" },
            { name: "Extra Course 1", credit: 6, grade: 100, passed: "Yes" },
            { name: "Extra Course 2", credit: 6, grade: 100, passed: "Yes" },
            { name: "Extra Course 3", credit: 6, grade: 100, passed: "Yes" },
            { name: "Extra Course 4", credit: 6, grade: 100, passed: "Yes" },
            { name: "Extra Course 5", credit: 6, grade: 100, passed: "Yes" }
        ];

        function getGP(score) {
            if (score <= 50) return 0.00;
            if (score <= 60) return 1.00;
            if (score <= 95) return 1.00 + (score - 60) * 0.08;
            return 4.00;
        }

        function renderTable() {
            const body = document.getElementById('courseBody');
            courses.forEach(c => {
                body.innerHTML += `<tr><td>${c.name}</td><td>${c.credit}</td><td>${c.grade}</td><td>${c.passed}</td></tr>`;
            });
        }

        function calculateGPA() {
            let totalWeightedGP = 0, totalCredits = 0;
            courses.forEach(c => {
                if (c.passed === "Yes") {
                    totalWeightedGP += getGP(c.grade) * c.credit;
                    totalCredits += c.credit;
                }
            });
            document.getElementById('result').innerText = "GPA: " + (totalWeightedGP / totalCredits).toFixed(1);
        }

        function calculateAI() {
            // Assume student has 50 current points in AI + 30 final points = 80
            const aiIndex = courses.findIndex(c => c.name === "Introduction to AI");
            courses[aiIndex].grade = 80;
            courses[aiIndex].passed = "Yes";
            calculateGPA();
        }

        renderTable();
    </script>
</body>
</html>
